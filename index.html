<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Japanese Kana Practice App</title>

	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="style.css">

	<script src="https://code.jquery.com/jquery-3.7.1.min.js" defer></script>
	<script src="script.js" defer></script>
</head>

<body>
	<header>
		<div class="formsection character-system">
			<span>Character System</span>

			<div class="formholder">
				<label>
					<input
						type="radio"
						name="charsystem"
						value="romaji"
						checked
					>
					Romaji
				</label>

				<label>
					<input
						type="radio"
						name="charsystem"
						value="hiragana"
					>
					Hiragana
				</label>

				<label>
					<input
						type="radio"
						name="charsystem"
						value="katakana"
					>
					Katakana
				</label>
			</div>
		</div>

<div class="formsection character-lines">


		<div class="formholder">
			<label>
				<input type="checkbox" name="charrow" value="a" checked>
				A
			</label>

			<label>
				<input type="checkbox" name="charrow" value="k" checked>
				K
			</label>

			<label>
				<input type="checkbox" name="charrow" value="s" checked>
				S
			</label>

			<label>
				<input type="checkbox" name="charrow" value="t" checked>
				T
			</label>

			<label>
				<input type="checkbox" name="charrow" value="n" checked>
				N
			</label>

			<label>
				<input type="checkbox" name="charrow" value="h" checked>
				H
			</label>

			<label>
				<input type="checkbox" name="charrow" value="m" checked>
				M
			</label>

			<label>
				<input type="checkbox" name="charrow" value="y" checked>
				Y
			</label>

			<label>
				<input type="checkbox" name="charrow" value="r" checked>
				R
			</label>

			<label>
				<input type="checkbox" name="charrow" value="w" checked>
				W
			</label>
		</div>
	</div>

		<div class="formsection pages">
			<span>Pages</span>

			<label>
				<input
					type="number"
					value="1"
					name="numpages"
					min="1"
					max="30"
				>
			</label>
		</div>

		<div class="formsection buttons">
			<button id="btnUpdate" type="button">Update</button>

			<button
				id="btnPrint"
				type="button"
				onclick="window.print()"
			>
				Print
			</button>
		</div>
	</header>

	<p id="output"></p>
</body>
</html>
