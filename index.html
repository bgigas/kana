<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Generate printable worksheets for practicing Japanese romaji, hiragana, and katakana.">
	<title>Japanese Kana Practice</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
	<script src="script.js" defer></script>
</head>
<body>
	<header class="controls">
		<h1>Japanese Kana Practice</h1>

		<fieldset class="form-section character-system">
			<legend>Character System</legend>
			<label><input type="radio" name="character-system" value="romaji" checked> Romaji</label>
			<label><input type="radio" name="character-system" value="hiragana"> Hiragana</label>
			<label><input type="radio" name="character-system" value="katakana"> Katakana</label>
		</fieldset>

		<fieldset class="form-section character-lines">
			<legend>Character Lines</legend>
			<label><input type="checkbox" name="character-row" value="a" checked> A</label>
			<label><input type="checkbox" name="character-row" value="k" checked> K</label>
			<label><input type="checkbox" name="character-row" value="s" checked> S</label>
			<label><input type="checkbox" name="character-row" value="t" checked> T</label>
			<label><input type="checkbox" name="character-row" value="n"> N</label>
			<label><input type="checkbox" name="character-row" value="h"> H</label>
			<label><input type="checkbox" name="character-row" value="m"> M</label>
			<label><input type="checkbox" name="character-row" value="y"> Y</label>
			<label><input type="checkbox" name="character-row" value="r"> R</label>
			<label><input type="checkbox" name="character-row" value="w"> W</label>
		</fieldset>

		<fieldset class="form-section page-options">
			<legend>Pages</legend>
			<label class="page-count">
				<span class="visually-hidden">Number of pages</span>
				<input type="number" name="page-count" value="1" min="1" max="30">
			</label>
		</fieldset>

		<div class="form-section actions">
			<button type="button" id="update-button">Update</button>
			<button type="button" id="print-button">Print</button>
		</div>
	</header>

	<main id="output" aria-live="polite"></main>

	<noscript>
		<p class="message">JavaScript must be enabled to generate a practice sheet.</p>
	</noscript>
</body>
</html>
